<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLT Group — Quote</title>
<style>
  /* ─── GLOBAL ─── */
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, sans-serif;
    background: #f0f2f5;
    color: #1a1a2e;
    font-size: 13px;
    min-height: 100vh;
  }

  /* ─── CONTROL BAR (screen only) ─── */
  .control-bar {
    background: #1a1a2e;
    padding: 10px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .ctrl-left { display: flex; align-items: center; gap: 12px; }
  .ctrl-logo {
    width: 36px; height: 36px; border-radius: 50%;
    background: #c9a96e; display: flex; align-items: center;
    justify-content: center; font-size: 10px; font-weight: 700;
    color: #1a1a2e; letter-spacing: 0.5px;
  }
  .ctrl-title { color: #fff; font-size: 13px; font-weight: 600; }
  .ctrl-sub { color: rgba(255,255,255,0.45); font-size: 11px; }
  .ctrl-right { display: flex; gap: 8px; }
  .btn {
    padding: 7px 16px; border-radius: 6px; font-size: 12px;
    font-weight: 600; cursor: pointer; border: none; transition: all .15s;
  }
  .btn-ghost {
    background: rgba(255,255,255,0.08); color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
  }
  .btn-ghost:hover { background: rgba(255,255,255,0.15); }
  .btn-gold { background: #c9a96e; color: #1a1a2e; }
  .btn-gold:hover { background: #b8956a; }

  /* ─── PAGE WRAPPER ─── */
  .page-wrap {
    display: flex; gap: 24px;
    max-width: 1280px; margin: 24px auto; padding: 0 24px;
  }

  /* ─── FORM PANEL ─── */
  .form-panel {
    width: 380px; flex-shrink: 0;
    background: #fff; border-radius: 10px;
    box-shadow: 0 2px 12px rgba(0,0,0,.07);
    padding: 20px; align-self: flex-start;
    position: sticky; top: 72px;
    max-height: calc(100vh - 90px); overflow-y: auto;
  }
  .fp-section { margin-bottom: 18px; }
  .fp-label {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.6px; color: #888; margin-bottom: 8px;
  }
  .fp-row { display: flex; gap: 8px; margin-bottom: 8px; }
  .fp-row:last-child { margin-bottom: 0; }
  label { font-size: 11px; color: #555; display: block; margin-bottom: 3px; }
  input[type=text], input[type=date], textarea, select {
    width: 100%; padding: 7px 10px; border: 1px solid #dde1e8;
    border-radius: 6px; font-size: 12px; color: #1a1a2e;
    font-family: Arial, sans-serif; background: #fafafa;
    outline: none; transition: border .15s;
  }
  input:focus, textarea:focus, select:focus { border-color: #c9a96e; background: #fff; }
  textarea { resize: vertical; min-height: 52px; }
  .fp-divider { border: none; border-top: 1px solid #edf0f5; margin: 14px 0; }

  /* BU selector */
  .bu-pills { display: flex; gap: 6px; flex-wrap: wrap; }
  .bu-pill {
    padding: 5px 12px; border-radius: 20px; font-size: 11px;
    font-weight: 600; cursor: pointer; border: 1.5px solid #dde1e8;
    color: #555; background: #fafafa; transition: all .15s;
  }
  .bu-pill.active { background: #1a1a2e; color: #fff; border-color: #1a1a2e; }

  /* Line items */
  .items-table { width: 100%; border-collapse: collapse; margin-bottom: 8px; }
  .items-table th {
    font-size: 10px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.4px; color: #888; padding: 4px 6px;
    border-bottom: 1px solid #edf0f5; text-align: left;
  }
  .items-table td { padding: 4px 4px; vertical-align: top; }
  .items-table input { font-size: 11px; padding: 5px 7px; }
  .del-row {
    background: none; border: none; color: #ccc; cursor: pointer;
    font-size: 14px; padding: 4px; line-height: 1;
  }
  .del-row:hover { color: #e74c3c; }
  .add-item-btn {
    font-size: 11px; color: #c9a96e; background: none; border: none;
    cursor: pointer; padding: 4px 0; font-weight: 600;
  }
  .add-item-btn:hover { color: #b8956a; }

  /* T&C */
  .tc-list { list-style: none; padding: 0; }
  .tc-item {
    display: flex; gap: 6px; align-items: flex-start;
    margin-bottom: 6px;
  }
  .tc-num {
    font-size: 11px; color: #888; min-width: 18px;
    padding-top: 7px; text-align: right;
  }
  .tc-item textarea { font-size: 11px; min-height: 44px; flex: 1; }
  .tc-preset-btns { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
  .tc-preset {
    font-size: 10px; padding: 4px 10px; border-radius: 4px;
    border: 1px solid #dde1e8; background: #fafafa; cursor: pointer;
    color: #555; font-weight: 600; transition: all .15s;
  }
  .tc-preset:hover { border-color: #c9a96e; color: #c9a96e; }
  .add-tc-btn {
    font-size: 11px; color: #c9a96e; background: none; border: none;
    cursor: pointer; padding: 4px 0; font-weight: 600;
  }

  /* ─── PREVIEW PANEL ─── */
  .preview-panel { flex: 1; }
  .preview-wrap {
    background: #fff; border-radius: 10px;
    box-shadow: 0 2px 12px rgba(0,0,0,.07);
    overflow: hidden;
  }
  .preview-label {
    background: #f7f8fa; border-bottom: 1px solid #edf0f5;
    padding: 10px 18px; font-size: 11px; color: #888;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .preview-scroll { padding: 0; }

  /* ─── QUOTE DOCUMENT ─── */
  .quote-doc {
    background: #fff;
    width: 100%;
    padding: 14px 40px 28px;
    font-family: Arial, sans-serif;
    color: #1a1a2e;
    font-size: 12px;
    line-height: 1.55;
    position: relative;
  }

  /* HEADER */
  .q-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    margin-top: -8px;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 2px solid #c9a96e;
  }
  .q-logo-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    margin-bottom: 10px;
  }
  .q-logo-img {
    max-height: 117px;
    max-width: 442px;
    object-fit: contain;
    display: block;
  }
  .q-logo-placeholder {
    width: 220px; height: 60px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    border: 2px solid #c9a96e; border-radius: 6px;
    gap: 2px;
  }
  .q-logo-name {
    font-size: 15px; font-weight: 800; color: #1a1a2e; letter-spacing: 1.5px;
  }
  .q-logo-sub {
    font-size: 8px; color: #888; letter-spacing: 0.5px; text-transform: uppercase;
  }
  .q-company-name {
    font-size: 11px; color: #555; font-style: italic; text-align: center;
  }

  /* META ROW */
  .q-meta-row {
    display: flex; justify-content: space-between;
    align-items: flex-start; margin-bottom: 14px; gap: 12px;
  }
  .q-meta-left { flex: 1; }
  .q-meta-right { text-align: right; min-width: 160px; }
  .q-ref { font-size: 12px; font-weight: 700; color: #1a1a2e; }
  .q-date { font-size: 11px; color: #888; margin-top: 2px; }
  .q-subject { font-size: 13px; font-weight: 700; margin-bottom: 12px; }

  /* ADDRESS BLOCK */
  .q-addr-block { margin-bottom: 12px; }
  .q-addr-label { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.4px; }
  .q-addr-name { font-size: 12px; font-weight: 700; }
  .q-addr-attn { font-size: 12px; }

  /* GREETING */
  .q-greeting { margin-bottom: 10px; font-size: 12px; }

  /* LINE ITEMS TABLE */
  .q-table {
    width: 100%; border-collapse: collapse;
    margin-bottom: 10px; font-size: 11.5px;
  }
  .q-table th {
    background: #1a1a2e; color: #fff; padding: 7px 10px;
    text-align: left; font-size: 10.5px; letter-spacing: 0.3px;
  }
  .q-table th:last-child { text-align: right; }
  .q-table td { padding: 6px 10px; border-bottom: 1px solid #edf0f5; vertical-align: top; }
  .q-table td:last-child { text-align: right; white-space: nowrap; }
  .q-table tbody tr:nth-child(even) td { background: #fafbfc; }
  .q-table .route { color: #555; font-size: 10.5px; }
  .q-table .remarks { color: #888; font-size: 10px; font-style: italic; }
  .q-total-row td {
    background: #f7f3ec !important;
    font-weight: 700; font-size: 12px;
    border-top: 2px solid #c9a96e;
    border-bottom: 2px solid #c9a96e;
  }

  /* PO NAME - BOLD */
  .q-po-block {
    margin: 10px 0 14px;
    font-size: 11.5px;
    padding: 8px 12px;
    background: #f7f8fa;
    border-left: 3px solid #c9a96e;
    border-radius: 0 4px 4px 0;
  }
  .q-po-block .po-label { color: #888; font-size: 10px; text-transform: uppercase; letter-spacing: 0.4px; }
  .q-po-issued { font-size: 12px; font-weight: 800; color: #1a1a2e; }

  /* T&C */
  .q-tc-heading {
    font-size: 11px; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.5px; margin-bottom: 6px; color: #555;
    border-bottom: 1px solid #edf0f5; padding-bottom: 4px;
  }
  .q-tc-list { padding-left: 0; list-style: none; margin-bottom: 14px; }
  .q-tc-list li {
    font-size: 10.5px; color: #444; padding: 2px 0 2px 0;
    display: flex; gap: 5px; line-height: 1.45;
  }
  .q-tc-num { color: #c9a96e; font-weight: 700; min-width: 16px; }

  /* SIGNATURE — BOTTOM */
  .q-signature {
    margin-top: 18px;
    padding-top: 14px;
    border-top: 1px solid #edf0f5;
    display: flex;
    justify-content: flex-end;
  }
  .q-sig-block { text-align: left; min-width: 200px; }
  .q-sig-label { display: none; }
  .q-sig-line { border-top: 1px solid #1a1a2e; padding-top: 6px; }
  .q-sig-name { font-size: 12px; font-weight: 700; }
  .q-sig-designation { font-size: 11px; color: #555; }
  .q-sig-contact { font-size: 10.5px; color: #888; }

  /* FOOTER */
  .q-footer {
    margin-top: 18px;
  }
  .q-footer-img { width: 100%; display: block; }
  .q-disclaimer {
    margin-top: 8px;
    font-size: 9px;
    color: #888;
    text-align: center;
    line-height: 1.5;
    padding: 6px 0 0;
  }
  .q-disclaimer a { color: #c9a96e; text-decoration: none; }



  /* ─── PRINT ─── */
  @media print {
    body { background: #fff; }
    .control-bar, .form-panel, .preview-label { display: none !important; }
    .page-wrap { display: block; margin: 0; padding: 0; }
    .preview-panel { width: 100%; }
    .preview-wrap { box-shadow: none; border-radius: 0; }
    .quote-doc { padding: 18px 28px; }
  }
</style>
</head>
<body>

<!-- CONTROL BAR -->
<div class="control-bar">
  <div class="ctrl-left">
    <div class="ctrl-logo">CLT</div>
    <div>
      <div class="ctrl-title">CLT Group — Quote Generator</div>
      <div class="ctrl-sub">Internal use · Publishable quote output</div>
    </div>
  </div>
  <div class="ctrl-right">
    <button class="btn btn-ghost" onclick="resetForm()">↺ Reset</button>
    <button class="btn btn-ghost" onclick="window.print()">🖨 Print / PDF</button>
    <button class="btn btn-gold" onclick="downloadHTML()">⬇ Download HTML</button>
  </div>
</div>

<!-- MAIN -->
<div class="page-wrap">

  <!-- FORM PANEL -->
  <div class="form-panel">

    <div class="fp-section">
      <div class="fp-label">Business Unit</div>
      <div class="bu-pills" id="bu-pills">
        <div class="bu-pill active" onclick="setBU(this,'CLPT','Classic Luxury Passenger Transport L.L.C')">CLPT</div>
        <div class="bu-pill" onclick="setBU(this,'CLT','Classic Luxury Transport L.L.C')">CLT</div>
        <div class="bu-pill" onclick="setBU(this,'CG','Classic Group')">Classic Group</div>
        <div class="bu-pill" onclick="setBU(this,'OLT','Online Luxury Transport L.L.C')">OLT</div>
      </div>
    </div>

    <hr class="fp-divider">

    <div class="fp-section">
      <div class="fp-label">Quote Details</div>
      <div class="fp-row">
        <div style="flex:1">
          <label>Ref No.</label>
          <input type="text" id="f-ref" placeholder="Auto-generated">
        </div>
        <div style="flex:1">
          <label>Date</label>
          <input type="date" id="f-date">
        </div>
      </div>
      <div>
        <label>Subject</label>
        <input type="text" id="f-subject" placeholder="e.g. Quotation for Ground Transportation Services">
      </div>
    </div>

    <hr class="fp-divider">

    <div class="fp-section">
      <div class="fp-label">Addressed To</div>
      <div style="margin-bottom:8px">
        <label>Company / Customer Name</label>
        <input type="text" id="f-company" placeholder="Company name">
      </div>
      <div style="margin-bottom:8px">
        <label>Attn</label>
        <input type="text" id="f-attn" placeholder="Contact person name">
      </div>
      <div>
        <label>Greeting</label>
        <input type="text" id="f-greeting" placeholder="Dear Sir / Dear Ma'am">
      </div>
    </div>

    <hr class="fp-divider">

    <div class="fp-section">
      <div class="fp-label">Line Items</div>
      <table class="items-table">
        <thead>
          <tr>
            <th style="width:36%">Vehicle / Service</th>
            <th style="width:30%">Route</th>
            <th style="width:20%">Remarks</th>
            <th style="width:11%">AED</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="items-body"></tbody>
      </table>
      <button class="add-item-btn" onclick="addItem()">+ Add Line Item</button>
    </div>

    <hr class="fp-divider">

    <div class="fp-section">
      <div class="fp-label">PO / Issued To</div>
      <div>
        <label>PO Name — Issued To</label>
        <input type="text" id="f-po" placeholder="e.g. Classic Luxury Passenger Transport L.L.C">
      </div>
    </div>

    <hr class="fp-divider">

    <div class="fp-section">
      <div class="fp-label">Terms &amp; Conditions</div>
      <div class="tc-preset-btns">
        <button class="tc-preset" onclick="loadTC('combined')">Load Combined T&amp;C</button>
        <button class="tc-preset" onclick="loadTC('clear')">Clear All</button>
      </div>
      <ul class="tc-list" id="tc-list"></ul>
      <button class="add-tc-btn" onclick="addTC('')">+ Add Term</button>
    </div>

    <hr class="fp-divider">

    <div class="fp-section">
      <div class="fp-label">Signatory</div>
      <div style="margin-bottom:8px">
        <label>Name</label>
        <input type="text" id="f-sig-name" placeholder="e.g. Abdullah Al Mansoori">
      </div>
      <div style="margin-bottom:8px">
        <label>Designation</label>
        <input type="text" id="f-sig-desig" placeholder="e.g. General Manager">
      </div>
      <div style="margin-bottom:8px">
        <label>Mobile</label>
        <input type="text" id="f-sig-mob" placeholder="+971 XX XXX XXXX">
      </div>
      <div>
        <label>Email</label>
        <input type="text" id="f-sig-email" placeholder="name@cltdxb.com">
      </div>
    </div>

    <button class="btn btn-gold" style="width:100%;margin-top:8px" onclick="renderPreview()">↻ Update Preview</button>
  </div>

  <!-- PREVIEW PANEL -->
  <div class="preview-panel">
    <div class="preview-wrap">
      <div class="preview-label">Live Preview — Quote Document</div>
      <div class="preview-scroll">
        <div class="quote-doc" id="quote-doc">
          <!-- rendered by JS -->
        </div>
      </div>
    </div>
  </div>

</div><!-- /page-wrap -->

// ─── BU ───
function setBU(el, code, full) {
  document.querySelectorAll('.bu-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  state.bu = code;
  state.buFull = full;
  genRef();
  // Update PO field
  document.getElementById('f-po').value = full;
  renderTCList();
  renderPreview();
}

// ─── DATE ───
function setDate() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  document.getElementById('f-date').value = `${y}-${m}-${day}`;
}

function formatDate(val) {
  if (!val) return '';
  const d = new Date(val + 'T00:00:00');
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const day = d.getDate();
  const suf = day >= 11 && day <= 13 ? 'th' : ['th','st','nd','rd'][day%10] || 'th';
  return `${day}${suf} ${months[d.getMonth()]}, ${d.getFullYear()}`;
}

// ─── REF ───
function genRef() {
  const d = new Date();
  const dd = String(d.getDate()).padStart(2,'0');
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const yy = d.getFullYear();
  document.getElementById('f-ref').value = `${state.bu} ${dd}${mm}${yy}-${state.seqNum}`;
}

// ─── LINE ITEMS ───
function addItem(vehicle='', route='', remarks='', amount='') {
  state.items.push({ vehicle, route, remarks, amount });
  renderItems();
}

function renderItems() {
  const tbody = document.getElementById('items-body');
  tbody.innerHTML = '';
  state.items.forEach((item, i) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><input type="text" value="${item.vehicle}" placeholder="Vehicle / service" onchange="state.items[${i}].vehicle=this.value;renderPreview()"></td>
      <td><input type="text" value="${item.route}" placeholder="Route / trip" onchange="state.items[${i}].route=this.value;renderPreview()"></td>
      <td><input type="text" value="${item.remarks}" placeholder="Remarks" onchange="state.items[${i}].remarks=this.value;renderPreview()"></td>
      <td><input type="text" value="${item.amount}" placeholder="0.00" style="text-align:right" onchange="state.items[${i}].amount=this.value;renderPreview()"></td>
      <td><button class="del-row" onclick="removeItem(${i})">×</button></td>
    `;
    tbody.appendChild(tr);
  });
}

function removeItem(i) {
  state.items.splice(i, 1);
  renderItems();
  renderPreview();
}

// ─── TOTAL ───
function calcTotal() {
  return state.items.reduce((s, item) => {
    const v = parseFloat(String(item.amount).replace(/,/g,'')) || 0;
    return s + v;
  }, 0);
}

function fmtAED(n) {
  return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
}

function loadTC(type) {
  state.tcs = [];
  if (type === 'combined') {
    COMBINED_TC.forEach(t => state.tcs.push(t));
  }
  renderTCList();
  renderPreview();
}

function resolveBU(text) {
  return text.replace(/__BU_FULL__/g, state.buFull);
}

function renderTCList() {
  const ul = document.getElementById('tc-list');
  ul.innerHTML = '';
  state.tcs.forEach((tc, i) => {
    const li = document.createElement('li');
    li.className = 'tc-item';
    li.innerHTML = `
      <span class="tc-num">${i+1}.</span>
      <textarea onchange="state.tcs[${i}]=this.value;renderPreview()">${resolveBU(tc)}</textarea>
      <button class="del-row" onclick="removeTC(${i})">×</button>
    `;
    ul.appendChild(li);
  });
}

function addTC(text) {
  state.tcs.push(text);
  renderTCList();
  renderPreview();
}

function removeTC(i) {
  state.tcs.splice(i, 1);
  renderTCList();
  renderPreview();
}

  const names = {
    CLPT: { line1: 'CLASSIC LUXURY', line2: 'PASSENGER TRANSPORT L.L.C' },
    CLT:  { line1: 'CLASSIC LUXURY', line2: 'TRANSPORT L.L.C' },
    CG:   { line1: 'CLASSIC', line2: 'GROUP' },
    OLT:  { line1: 'ONLINE LUXURY', line2: 'TRANSPORT L.L.C' },

  return `<div class="q-logo-placeholder"><div class="q-logo-name">${n.line1}</div><div class="q-logo-sub">${n.line2}</div></div>`;
}

        P.O. Box 124797, Dubai, UAE<br>
        corporate@cltdxb.com
      </div>
      <div class="q-footer-office">
        <strong>Abu Dhabi Office</strong>
        Tel: +971 2 XXX XXXX<br>
        P.O. Box XXXXX, Abu Dhabi<br>
        abudhabi@cltdxb.com
      </div>
      <div class="q-footer-office">
        <strong>www.cltdxb.com</strong><br>

        CR No: XXXXXXXXX
      </div>
    `;
  }
  return `
    <div class="q-footer-office">

}

// ─── RENDER PREVIEW ───
function renderPreview() {
  const ref = document.getElementById('f-ref').value;
  const dateRaw = document.getElementById('f-date').value;
  const subject = document.getElementById('f-subject').value || 'Quotation for Ground Transportation Services';
  const company = document.getElementById('f-company').value || '[Customer Name]';
  const attn = document.getElementById('f-attn').value;
  const greeting = document.getElementById('f-greeting').value || 'Dear Sir / Ma\'am,';
  const po = document.getElementById('f-po').value || state.buFull;
  const sigName = document.getElementById('f-sig-name').value || 'Authorised Signatory';
  const sigDesig = document.getElementById('f-sig-desig').value;
  const sigMob = document.getElementById('f-sig-mob').value;
  const sigEmail = document.getElementById('f-sig-email').value;

  const total = calcTotal();

  // Line items rows
  const itemRows = state.items.map(item => {
    const amt = parseFloat(String(item.amount).replace(/,/g,'')) || 0;
    return `
      <tr>
        <td>
          <div>${item.vehicle || '—'}</div>
          ${item.route ? `<div class="route">${item.route}</div>` : ''}
          ${item.remarks ? `<div class="remarks">${item.remarks}</div>` : ''}
        </td>
        <td style="text-align:right">AED ${fmtAED(amt)}</td>
      </tr>
    `;
  }).join('');

  // T&C rows
  const tcRows = state.tcs.map((tc, i) => `
    <li><span class="q-tc-num">${i+1}.</span> ${resolveBU(tc)}</li>
  `).join('');

  const doc = document.getElementById('quote-doc');
  doc.innerHTML = `
    <!-- HEADER -->
    <div class="q-header">
      <div class="q-logo-area">
        ${getLogoHTML(state.bu)}
      </div>
    </div>

    <!-- META ROW -->
    <div class="q-meta-row">
      <div class="q-meta-left">
        <div class="q-ref">${ref || state.bu + ' —'}</div>
        <div class="q-date">${formatDate(dateRaw)}</div>
      </div>
      <div class="q-meta-right">
        <div style="font-size:10px;color:#888;text-transform:uppercase;letter-spacing:0.4px">Quotation</div>
      </div>
    </div>

    <!-- SUBJECT -->
    <div class="q-subject">${subject}</div>

    <!-- ADDRESSED TO -->
    <div class="q-addr-block">
      <div class="q-addr-label">To</div>
      <div class="q-addr-name">${company}</div>
      ${attn ? `<div class="q-addr-attn">Attn: ${attn}</div>` : ''}
    </div>

    <!-- GREETING -->
    <div class="q-greeting">${greeting}</div>
    <div style="font-size:12px;color:#444;margin-bottom:12px">
      We are pleased to submit our quotation for the transportation services detailed below. Please find our rates as follows:
    </div>

    <!-- LINE ITEMS TABLE -->
    <table class="q-table">
      <thead>
        <tr>
          <th>Vehicle / Service Description</th>
          <th style="text-align:right">Amount (AED)</th>
        </tr>
      </thead>
      <tbody>
        ${itemRows}
        <tr class="q-total-row">
          <td>Total Amount</td>
          <td>AED ${fmtAED(total)}</td>
        </tr>
      </tbody>
    </table>

    <!-- PO ISSUED TO — BOLD -->
    <div class="q-po-block">
      <div class="po-label">Purchase Order — To be issued in the name of</div>
      <div class="q-po-issued">${po}</div>
    </div>

    <!-- T&C -->
    ${tcRows.length ? `
      <div class="q-tc-heading">Terms &amp; Conditions</div>
      <ul class="q-tc-list">${tcRows}</ul>
    ` : ''}

    <!-- SIGNATURE — BOTTOM -->
    <div class="q-signature">
      <div class="q-sig-block">
        
        <div class="q-sig-line">
          <div class="q-sig-name">${sigName}</div>
          ${sigDesig ? `<div class="q-sig-designation">${sigDesig}</div>` : ''}
          ${sigMob ? `<div class="q-sig-contact">${sigMob}</div>` : ''}
          ${sigEmail ? `<div class="q-sig-contact">${sigEmail}</div>` : ''}
        </div>
      </div>
    </div>

    <!-- FOOTER -->
    <div class="q-footer">
      <img class="q-footer-img" src="${BU_ASSETS[state.bu]?.footer || ''}" alt="Footer">
      <div class="q-disclaimer">
        This document is computer-generated and does not require the signature or the Company's stamp to be considered valid.<br>
        For any clarification, please send us an email at <a href="mailto:corporate@cltdxb.com">corporate@cltdxb.com</a> with the quote details.
      </div>
    </div>
  `;
}

  const full = `<!DOCTYPE html><html><head><meta charset="UTF-8">

<style>

.q-ref{font-size:12px;font-weight:700}.q-date{font-size:11px;color:#888;margin-top:2px}
.q-subject{font-size:13px;font-weight:700;margin-bottom:12px}
.q-addr-block{margin-bottom:12px}.q-addr-label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:0.4px}
.q-addr-name{font-size:12px;font-weight:700}.q-greeting{margin-bottom:10px;font-size:12px}

.q-tc-list li{font-size:10.5px;color:#444;padding:2px 0;display:flex;gap:5px;line-height:1.45}
.q-tc-num{color:#c9a96e;font-weight:700;min-width:16px}
.q-signature{margin-top:18px;padding-top:14px;border-top:1px solid #edf0f5;display:flex;justify-content:flex-end}

.q-sig-name{font-size:12px;font-weight:700}.q-sig-designation{font-size:11px;color:#555}

// ─── RESET ───
function resetForm() {
  if (!confirm('Reset all fields?')) return;
  document.getElementById('f-company').value = '';
  document.getElementById('f-attn').value = '';
  document.getElementById('f-subject').value = '';
  state.items = [];
  state.seqNum++;
  genRef();
  renderItems();
  loadTC('combined');
  renderPreview();
}
</script>
